<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--color-canvas); padding: 24px 28px; font-family: var(--font-display); }
  .row { margin-bottom: 12px; display: flex; align-items: baseline; gap: 16px; }
  .label { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-stone); min-width: 80px; flex-shrink: 0; }
  .sample { color: var(--color-slate); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">Hero / 300</span>
    <span class="sample" style="font-size:52px;font-weight:300;line-height:1.1;">Your clinic, <em style="color:#C9A882;font-style:italic;">reimagined.</em></span>
  </div>
  <div class="row">
    <span class="label">H1 / 500</span>
    <span class="sample" style="font-size:38px;font-weight:500;line-height:1.15;">Built for dermatologists.</span>
  </div>
  <div class="row">
    <span class="label">H2 / 500</span>
    <span class="sample" style="font-size:28px;font-weight:500;line-height:1.2;">Everything your practice needs</span>
  </div>
  <div class="row">
    <span class="label">Italic / 300</span>
    <span class="sample" style="font-size:22px;font-weight:300;font-style:italic;color:#C9A882;">"The support we needed from day one."</span>
  </div>
</body>
</html>
