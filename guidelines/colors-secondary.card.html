<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--color-canvas); padding: 20px; font-family: var(--font-body); }
  .swatches { display: flex; gap: 12px; }
  .swatch { flex: 1; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid rgba(0,0,0,0.06); }
  .swatch-color { height: 80px; }
  .swatch-info { padding: 8px 10px; background: var(--color-white); }
  .swatch-name { font-size: 11px; font-weight: 600; color: var(--color-slate); text-transform: uppercase; letter-spacing: 0.08em; }
  .swatch-hex { font-size: 11px; color: var(--color-stone); margin-top: 2px; }
</style>
</head>
<body>
<div class="swatches">
  <div class="swatch">
    <div class="swatch-color" style="background:#E8D5C4;"></div>
    <div class="swatch-info"><div class="swatch-name">Blush Dust</div><div class="swatch-hex">#E8D5C4</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#8A8078;"></div>
    <div class="swatch-info"><div class="swatch-name">Stone</div><div class="swatch-hex">#8A8078</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#FFFFFF; border-bottom:1px solid #E8D5C4;"></div>
    <div class="swatch-info"><div class="swatch-name">White Sand</div><div class="swatch-hex">#FFFFFF</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#C0605A;"></div>
    <div class="swatch-info"><div class="swatch-name">Error Rose</div><div class="swatch-hex">#C0605A</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#5A8A72;"></div>
    <div class="swatch-info"><div class="swatch-name">Success Moss</div><div class="swatch-hex">#5A8A72</div></div>
  </div>
</div>
</body>
</html>
