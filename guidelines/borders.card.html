<!-- @dsCard group="Spacing" viewport="700x140" name="Border Radius & Borders" subtitle="radius-sm (2px) · radius-md (4px) · radius-lg (6px) — no pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--color-canvas); padding: 20px; font-family: var(--font-body); }
  .row { display: flex; gap: 20px; align-items: center; margin-bottom: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 80px; height: 44px; background: var(--color-white); border: 1.5px solid var(--color-blush); display: flex; align-items: center; justify-content: center; }
  .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-stone); text-align: center; }
  .divider { width: 1px; height: 60px; background: var(--color-blush); margin: 0 8px; }
  .border-row { display: flex; gap: 20px; align-items: center; }
  .border-item { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .border-line { width: 120px; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:2px;">2px</div><span class="label">radius-sm<br/>Buttons</span></div>
  <div class="item"><div class="box" style="border-radius:4px;">4px</div><span class="label">radius-md<br/>Inputs</span></div>
  <div class="item"><div class="box" style="border-radius:6px;">6px</div><span class="label">radius-lg<br/>Cards (max)</span></div>
  <div class="divider"></div>
  <div class="item"><div class="box" style="border-radius:2px;border:1px solid #E8D5C4;background:#FAF7F4;">Default</div><span class="label">1px blush<br/>border-light</span></div>
  <div class="item"><div class="box" style="border-radius:2px;border:1.5px solid #C9A882;background:#FAF7F4;">Focus</div><span class="label">1.5px dune<br/>border-focus</span></div>
  <div class="item"><div class="box" style="border-radius:2px;border:1.5px solid #C0605A;background:#FAF7F4;">Error</div><span class="label">1.5px error<br/>border-error</span></div>
  <div class="item"><div class="box" style="border-radius:2px;border:2px solid #C9A882;background:#FAF7F4;">Featured</div><span class="label">2px dune<br/>featured card</span></div>
</div>
</body>
</html>
