<style>
  body { background: var(--color-canvas); padding: 24px 28px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; }

</style>

<body>
<div id="root"></div>
<script>
  const { Input } = window.DermaStartDesignSystem_1e5d5c;
  const { createElement: h } = React;

  const App = () => h('div', { className: 'grid' },
    h('div', null,
      h('div', { className: 'label-row' }, 'Default'),
      h(Input, { label: 'Full name', id: 'name', placeholder: 'Dr. Priya Sharma' })

    h('div', null,
      h('div', { className: 'label-row' }, 'With helper'),
      h(Input, { label: 'Email address', id: 'email', type: 'email', placeholder: 'you@clinic.in', helper: 'We\'ll send consultation details here' })
    ),
    h('div', null,
      h('div', { className: 'label-row' }, 'Error state'),
      h(Input, { label: 'Phone number', id: 'phone', type: 'tel', error: 'Please enter a valid mobile number', value: '9800' })
    ),
    h('div', null,
      h('div', { className: 'label-row' }, 'Disabled'),
      h(Input, { label: 'City', id: 'city', disabled: true, value: 'Mumbai' })
    ),
    h('div', null,
      h('div', { className: 'label-row' }, 'Required'),
      h(Input, { label: 'Clinic name', id: 'clinic', placeholder: 'e.g. Dermanova Clinic', required: true })
    ),
  );

  ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
